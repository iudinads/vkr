<!DOCTYPE html>
<html>
<head>
    <title>Сброс пароля</title>
    <link rel="stylesheet" href="/static/auth.css">
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .reset-container {
            background: white;
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 420px;
            text-align: center;
        }
        .reset-title {
            color: #4f46e5;
            margin-bottom: 1.5rem;
            font-size: 1.5rem;
        }
        .reset-input {
            width: 100%;
            padding: 0.8rem;
            margin-bottom: 1rem;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
        }
        .reset-btn {
            width: 100%;
            padding: 0.8rem;
            background: #4f46e5;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        .reset-btn:hover {
            background: #4338ca;
        }
        .status-message {
            margin: 1rem 0;
            padding: 0.5rem;
            border-radius: 6px;
        }
        .error {
            background: #fee2e2;
            color: #dc2626;
        }
        .success {
            background: #dcfce7;
            color: #16a34a;
        }
    </style>
</head>
<body>
    <div class="reset-container">
        <h1 class="reset-title">Создайте новый пароль</h1>
        <form id="resetForm">
            <input type="hidden" id="token" value="{{ token }}">
            <input type="password" id="newPassword" class="reset-input" placeholder="Новый пароль" required>
            <input type="password" id="confirmPassword" class="reset-input" placeholder="Повторите пароль" required>
            <button type="submit" class="reset-btn">Сохранить пароль</button>
            <div id="statusMessage" class="status-message"></div>
        </form>
    </div>

    <script>
        // Тот же самый скрипт, что и ранее
        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const token = document.getElementById('token').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const statusElement = document.getElementById('statusMessage');
            
            if (newPassword !== confirmPassword) {
                statusElement.textContent = 'Пароли не совпадают';
                statusElement.className = 'status-message error';
                return;
            }
            
            try {
                const response = await fetch('/reset-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        token: token,
                        new_password: newPassword
                    }),
                });
                
                const data = await response.json();
                
                if (data.status === 'success') {
                    statusElement.textContent = data.message;
                    statusElement.className = 'status-message success';
                    setTimeout(() => {
                        window.location.href = data.redirect || '/';
                    }, 1500);
                } else {
                    statusElement.textContent = data.message;
                    statusElement.className = 'status-message error';
                }
            } catch (error) {
                statusElement.textContent = 'Ошибка соединения';
                statusElement.className = 'status-message error';
                console.error('Ошибка:', error);
            }
        });
    </script>
</body>
</html>
