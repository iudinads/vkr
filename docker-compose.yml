services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vkr_app
    env_file:
      - .env
    ports:
      - "8000:8000"
    restart: always

  nginx:
    image: nginx:alpine
    container_name: vkr_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - app
    restart: always
