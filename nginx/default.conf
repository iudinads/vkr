server {
    listen 80;
    server_name mlpreprocessing.ru;
    # VPS_ЗАМЕНИТЕ_МЕНЯ: укажите ваш домен в server_name

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name mlpreprocessing.ru;
    # VPS_ЗАМЕНИТЕ_МЕНЯ: укажите ваш домен в server_name

    ssl_certificate /etc/letsencrypt/live/mlpreprocessing.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mlpreprocessing.ru/privkey.pem;
    # VPS_ЗАМЕНИТЕ_МЕНЯ: укажите путь к сертификатам вашего домена

    location / {
        proxy_pass http://app:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
